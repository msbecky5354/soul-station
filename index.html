<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="appName">貼地通 - 儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="lang.js?v=15"></script>
    <script src="config.js?v=15"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overscroll-behavior-y: none; }
        .swipe-container { position: relative; overflow: hidden; border-radius: 0.5rem; margin-bottom: 0.75rem; }
        .swipe-content { position: relative; z-index: 10; background: white; transition: transform 0.2s ease-out; touch-action: pan-y; }
        .swipe-actions { position: absolute; top: 0; right: 0; bottom: 0; width: 80px; background-color: #ef4444; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }
        .drag-handle { cursor: grab; touch-action: none; }
        .drag-handle:active { cursor: grabbing; }
        .group-title-handle { cursor: grab; touch-action: none; padding: 0.5rem 0; }
        .group-title-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background-color: #f3f4f6; border: 2px dashed #cbd5e1; }
        .group-block { transition: all 0.2s; }
        .hidden-step { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans pb-24">
    <div id="app-header"></div>
    
    <main id="dashboard-container" class="flex-1 p-4 overflow-y-auto">
        <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-gray-400">
            <i class="fas fa-route text-4xl mb-3 text-gray-300"></i>
            <p data-i18n="emptyDesc">尚未設定任何路線</p>
            <button onclick="window.location.href='setup.html'" class="mt-4 bg-red-600 text-white px-6 py-2 rounded-full shadow-md font-bold" data-i18n="goToSetupBtn">+ 新增路線</button>
        </div>
    </main>

    <div id="app-footer"></div>

    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center hidden-step">
        <div class="bg-white rounded-xl p-6 w-11/12 max-w-sm shadow-2xl">
            <h3 class="font-bold text-lg mb-4 text-gray-800" data-i18n="editRouteTitle">✏️ 編輯路線花名</h3>
            <label class="block text-sm font-medium text-gray-600 mb-1" data-i18n="aliasLabel">自訂花名 (Alias)</label>
            <input type="text" id="edit-alias-input" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 mb-5 focus:border-red-500 focus:outline-none transition">
            <div class="flex justify-end space-x-3">
                <button onclick="closeEditModal()" class="px-5 py-2.5 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition" data-i18n="cancelBtn">取消</button>
                <button onclick="saveEdit()" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold shadow-md transition" data-i18n="saveBtn">儲存</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderHeader === "function") renderHeader();
            if (typeof renderFooter === "function") renderFooter();
            checkImportDeepLink();
            autoHealRoutes();
            initDashboard();
        });

        // ==========================================
        // 模塊 1：強效縮網址與無縫分享系統
        // ==========================================
        
        function shortenUrlFallback(longUrl) {
            return new Promise((resolve) => {
                const callbackName = 'isgd_callback_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    const script = document.getElementById(callbackName);
                    if(script) script.remove();
                    resolve(data.shorturl ? data.shorturl : longUrl);
                };
                const script = document.createElement('script');
                script.id = callbackName;
                script.src = `https://is.gd/create.php?format=jsonp&url=${encodeURIComponent(longUrl)}&callback=${callbackName}`;
                script.onerror = () => { delete window[callbackName]; script.remove(); resolve(longUrl); };
                document.body.appendChild(script);
            });
        }

        async function shortenUrl(longUrl) {
            try {
                // 優先使用支援特長 URL 嘅 POST API
                const res = await fetch('https://spoo.me/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                    body: new URLSearchParams({ url: longUrl })
                });
                const data = await res.json();
                if (data.short_url) return data.short_url;
            } catch(e) {}
            // 如果失敗，退回 JSONP 方法
            return await shortenUrlFallback(longUrl);
        }

        async function shareGroup(event, groupName) {
            const routes = getRoutes().filter(r => r.group === groupName);
            if (routes.length === 0) return;
            
            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span class="text-xs ml-1 font-bold">打包中</span>';
            btn.disabled = true; btn.classList.add('opacity-70');

            try {
                // ✅ 極限數據壓縮：飛走無謂 Key，大幅縮減 JSON 長度
                const exportData = routes.map(r => ({
                    t: r.transitType, r: r.route, rk: r.route_key||'', s: r.stop_id,
                    dk: r.dest_key||'', dn: r.dest_name||'', sk: r.stop_key||'', sn: r.stop_name||'',
                    a: r.alias||'', c: r.color||'', u: r.apiUrl||''
                }));
                const payload = { g: groupName, d: exportData };
                const base64Str = btoa(encodeURIComponent(JSON.stringify(payload)));
                const longLink = window.location.origin + window.location.pathname + '?import=' + base64Str;
                
                const shortLink = await shortenUrl(longLink);
                const shareText = `快啲加入我嘅出門儀表板【${getTranslation(groupName, groupName)}】！\n\n${shortLink}`;
                const shareTitle = getTranslation('appName', '貼地通') + ' - ' + getTranslation(groupName, groupName);

                // ✅ 智能判斷：手機用原生 Share，電腦直接彈 WhatsApp Web
                if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
                    await navigator.share({ title: shareTitle, text: `快啲加入我嘅出門儀表板【${getTranslation(groupName, groupName)}】！\n\n`, url: shortLink });
                } else {
                    const waLink = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
                    window.open(waLink, '_blank');
                }
            } catch (error) {
                console.error("Share error:", error);
                alert("分享發生錯誤，請稍後再試。");
            } finally {
                btn.innerHTML = originalHtml; btn.disabled = false; btn.classList.remove('opacity-70');
            }
        }

        function checkImportDeepLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const importData = urlParams.get('import');
            if (importData) {
                try {
                    const payload = JSON.parse(decodeURIComponent(atob(importData)));
                    let newRoutes = [];

                    if (payload.g && payload.d) {
                        // ✅ 解開極限壓縮版數據
                        newRoutes = payload.d.map(min => ({
                            id: 'item_' + Date.now() + Math.floor(Math.random() * 10000),
                            group: payload.g, transitType: min.t, route: min.r, route_key: min.rk, stop_id: min.s,
                            dest_key: min.dk, dest_name: min.dn, stop_key: min.sk, stop_name: min.sn,
                            alias: min.a, isCustomAlias: (min.a !== ''), color: min.c, apiUrl: min.u, time: 'ALL_DAY'
                        }));
                    } else if (Array.isArray(payload)) {
                        // 兼容舊版長 Link
                        newRoutes = payload;
                    }

                    if (newRoutes.length > 0) {
                        let routes = getRoutes();
                        let importedCount = 0;
                        newRoutes.forEach(newRoute => {
                            const isDuplicate = routes.some(r => r.group === newRoute.group && r.transitType === newRoute.transitType && r.route === newRoute.route && r.stop_id === newRoute.stop_id);
                            if (!isDuplicate) {
                                newRoute.id = 'item_' + Date.now() + Math.floor(Math.random() * 10000);
                                routes.push(newRoute); importedCount++;
                            }
                        });
                        if (importedCount > 0) { saveRoutes(routes); alert(`🎉 成功匯入 ${importedCount} 條全新路線！`); } 
                        else { alert('⚠️ 這些路線已經在你的儀表板中，系統已自動攔截重複資料！'); }
                    }
                } catch (e) { alert('❌ 匯入失敗，連結可能無效或已損壞。'); }
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // ==========================================
        // 模塊 2：編輯功能 (Edit Modal)
        // ==========================================
        let currentEditId = null;
        function openEditModal(id) {
            const route = getRoutes().find(r => r.id === id); if (!route) return;
            currentEditId = id; document.getElementById('edit-alias-input').value = route.alias || '';
            document.getElementById('edit-modal').classList.remove('hidden-step');
            if (typeof translatePage === "function") translatePage();
        }

        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden-step'); }

        function saveEdit() {
            const newAlias = document.getElementById('edit-alias-input').value.trim();
            let routes = getRoutes(); let routeIndex = routes.findIndex(r => r.id === currentEditId);
            if (routeIndex !== -1) { routes[routeIndex].alias = newAlias; routes[routeIndex].isCustomAlias = newAlias !== ""; saveRoutes(routes); initDashboard(); }
            closeEditModal();
        }

        // ==========================================
        // 模塊 3：儀表板與卡片渲染
        // ==========================================
        function autoHealRoutes() {
            let routesStr = localStorage.getItem('hk_transit_routes'); if (!routesStr) return;
            let routes = JSON.parse(routesStr); let changed = false;
            let filteredRoutes = routes.filter(r => { if (r.transitType === 'TRAM') { changed = true; return false; } return true; });
            filteredRoutes.forEach(r => {
                if (r.transitType === 'MTR' && r.apiUrl && (r.apiUrl.includes('-OUTBOUND') || r.apiUrl.includes('-INBOUND'))) {
                    try {
                        let urlObj = new URL(r.apiUrl); let sta = urlObj.searchParams.get('sta');
                        if (sta && sta.includes('-OUTBOUND')) { urlObj.searchParams.set('sta', sta.replace('-OUTBOUND', '')); urlObj.searchParams.set('dir', 'UP'); r.apiUrl = urlObj.toString(); changed = true; } 
                        else if (sta && sta.includes('-INBOUND')) { urlObj.searchParams.set('sta', sta.replace('-INBOUND', '')); urlObj.searchParams.set('dir', 'DOWN'); r.apiUrl = urlObj.toString(); changed = true; }
                    } catch(e) {}
                }
                if (r.apiUrl && typeof r.apiUrl === 'string') {
                    const urlLower = r.apiUrl.toLowerCase(); let correctType = r.transitType;
                    if (urlLower.includes('kmb') || urlLower.includes('etabus')) correctType = 'KMB';
                    else if (urlLower.includes('citybus') || urlLower.includes('ctb')) correctType = 'CTB';
                    else if (urlLower.includes('nlb')) correctType = 'NLB';
                    if (correctType !== r.transitType) { r.transitType = correctType; changed = true; }
                }
            });
            if (changed) { localStorage.setItem('hk_transit_routes', JSON.stringify(filteredRoutes)); }
        }

        function getTranslation(key, defaultText) { return (langDict[currentLang] && langDict[currentLang][key]) ? langDict[currentLang][key] : (defaultText || key); }

        function getRoutes() {
            let routesStr = localStorage.getItem('hk_transit_routes'); let routes = []; if (!routesStr) return []; routes = JSON.parse(routesStr);
            let needSave = false;
            routes = routes.map(r => {
                if (r.group === "🏠 屋企落樓" || r.group === "🏠 屋企落楼" || r.group === "🏠 Home") { r.group = "groupHome"; needSave = true; }
                if (r.group === "💼 返工轉車" || r.group === "💼 返工转车" || r.group === "💼 Commute") { r.group = "groupWork"; needSave = true; }
                return r;
            });
            if (needSave) localStorage.setItem('hk_transit_routes', JSON.stringify(routes));
            return routes;
        }

        function saveRoutes(routes) { localStorage.setItem('hk_transit_routes', JSON.stringify(routes)); }

        function getTransitDisplayHtml(transitType) {
            const iconMap = {
                'KMB': '<i class="fas fa-bus text-red-500 mr-1"></i>', 'CITYBUS': '<i class="fas fa-bus text-yellow-500 mr-1"></i>', 'CTB': '<i class="fas fa-bus text-yellow-500 mr-1"></i>', 'NLB': '<i class="fas fa-bus-simple text-blue-500 mr-1"></i>',
                'MTR': '<img src="MTR.png" alt="MTR" class="inline-block w-6 h-6 mr-1 align-middle object-contain transform scale-125 -my-1">', 
                'LRT': '<i class="fas fa-train-tram text-orange-500 mr-1"></i>', 'FERRY': '<i class="fas fa-ship text-blue-600 mr-1"></i>', 'GMB': '<i class="fas fa-van-shuttle text-green-500 mr-1"></i>', 'BUS': '<i class="fas fa-bus text-gray-500 mr-1"></i>'
            };
            const langKeyMap = { 'KMB': 'transitKMB', 'CITYBUS': 'transitCTB', 'CTB': 'transitCTB', 'MTR': 'transitMTR', 'LRT': 'transitLRT', 'FERRY': 'transitFERRY', 'NLB': 'transitNLB', 'GMB': 'transitGMB', 'BUS': 'transitBUS' };
            const safeType = transitType ? transitType.toUpperCase() : 'BUS';
            const icon = iconMap[safeType] || '<i class="fas fa-route mr-1"></i>';
            return `${icon}${getTranslation(langKeyMap[safeType], safeType)}`;
        }

        function initDashboard() {
            const container = document.getElementById('dashboard-container'); const emptyState = document.getElementById('empty-state');
            const filteredRoutes = getRoutes(); 

            if (window.dashboardSortable) window.dashboardSortable.destroy();
            if (window.listSortables) window.listSortables.forEach(s => s.destroy());
            window.listSortables = [];

            container.innerHTML = '';
            if (filteredRoutes.length === 0) { container.appendChild(emptyState); emptyState.classList.remove('hidden'); return; }

            const grouped = filteredRoutes.reduce((acc, route) => { if (!acc[route.group]) acc[route.group] = []; acc[route.group].push(route); return acc; }, {});
            const savedGroupOrder = JSON.parse(localStorage.getItem('hk_transit_group_order') || '[]');
            const sortedGroupNames = Object.keys(grouped).sort((a, b) => {
                const idxA = savedGroupOrder.indexOf(a); const idxB = savedGroupOrder.indexOf(b);
                if (idxA === -1 && idxB === -1) return 0; if (idxA === -1) return 1; if (idxB === -1) return -1; return idxA - idxB;
            });

            sortedGroupNames.forEach(groupName => {
                const routes = grouped[groupName]; const displayGroupName = (groupName === 'groupWork' || groupName === 'groupHome') ? getTranslation(groupName, groupName) : groupName;
                const groupDiv = document.createElement('div');
                groupDiv.className = 'group-block mb-6 bg-white rounded-xl shadow-sm p-4 border border-gray-100'; groupDiv.dataset.groupName = groupName;
                
                groupDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                        <h2 class="group-title-handle text-md font-bold text-gray-700 uppercase tracking-wider flex items-center gap-2 hover:text-red-500 transition">
                            <i class="fas fa-grip-vertical text-gray-300"></i> <span>${displayGroupName}</span>
                        </h2>
                        <button onclick="shareGroup(event, '${groupName}')" class="text-gray-400 hover:text-blue-500 transition px-2 py-1 bg-blue-50 rounded-md">
                            <i class="fas fa-share-nodes"></i> <span class="text-xs ml-1 font-bold">分享</span>
                        </button>
                    </div>
                `;
                const listDiv = document.createElement('div'); listDiv.className = 'sortable-list space-y-3'; listDiv.dataset.group = groupName;
                routes.forEach(route => { listDiv.appendChild(createRouteCard(route)); });
                groupDiv.appendChild(listDiv); container.appendChild(groupDiv);

                const listSortable = new Sortable(listDiv, { handle: '.drag-handle', animation: 150, ghostClass: 'sortable-ghost', delay: 150, delayOnTouchOnly: true, fallbackOnBody: true, onEnd: function () { updateSorting(); } });
                window.listSortables.push(listSortable);
            });

            window.dashboardSortable = new Sortable(container, { draggable: '.group-block', handle: '.group-title-handle', animation: 150, ghostClass: 'sortable-ghost', delay: 150, delayOnTouchOnly: true, fallbackOnBody: true, onEnd: function () { updateGroupSorting(); } });

            translatePage(); initSwipeToDelete(); fetchAllETAs();
        }

        function createRouteCard(route) {
            const wrapper = document.createElement('div'); wrapper.className = 'swipe-container shadow-sm'; wrapper.dataset.id = route.id;
            const loadingText = getTranslation('loading', '載入中...');
            
            const getDynamicName = (nameObj) => { if (!nameObj) return ''; if (typeof nameObj === 'string') return nameObj; return nameObj[currentLang] || nameObj['tc'] || ''; };
            const stopName = route.stop_key ? getTranslation(route.stop_key) : getDynamicName(route.stop_name);
            const rawDestName = route.dest_key ? getTranslation(route.dest_key) : getDynamicName(route.dest_name);
            
            let cleanDestName = rawDestName;
            if (cleanDestName.includes('往 ')) cleanDestName = cleanDestName.split('往 ').pop().trim();
            else if (cleanDestName.toLowerCase().includes(' to ')) cleanDestName = cleanDestName.split(/ to /i).pop().trim();
            
            const toWord = currentLang === 'en' ? ' To ' : ' 往 '; const directionStr = cleanDestName ? `${stopName}${toWord}${cleanDestName}` : stopName;

            let mainTitle = directionStr; let subTitleHtml = '';
            if (route.isCustomAlias && route.alias && route.alias.trim() !== '') { mainTitle = route.alias; subTitleHtml = `<div class="text-[11px] text-gray-500 truncate mt-0.5">${directionStr}</div>`; }
            if (!mainTitle) mainTitle = route.route || "Transit Route";

            let shortRouteName = route.route || '';
            if (route.transitType === 'LRT' && shortRouteName.startsWith('LRT-')) shortRouteName = shortRouteName.replace('LRT-', '');
            if (route.transitType === 'FERRY' && shortRouteName.startsWith('FERRY-')) shortRouteName = shortRouteName.replace('FERRY-', '');
            if (route.transitType === 'MTR') {
                const mtrShort = { 'TML': currentLang==='en'?'TML':'屯馬', 'TCL': currentLang==='en'?'TCL':'東涌', 'KTL': currentLang==='en'?'KTL':'觀塘', 'TWL': currentLang==='en'?'TWL':'荃灣', 'ISL': currentLang==='en'?'ISL':'港島', 'EAL': currentLang==='en'?'EAL':'東鐵', 'SIL': currentLang==='en'?'SIL':'南港', 'TKL': currentLang==='en'?'TKL':'將軍澳', 'AEL': currentLang==='en'?'AEL':'機快', 'DRL': currentLang==='en'?'DRL':'迪士尼' };
                shortRouteName = mtrShort[shortRouteName] || shortRouteName;
            }

            const transitDisplay = getTransitDisplayHtml(route.transitType);
            let badgeHtml = '';
            if (route.transitType === 'MTR' || route.transitType === 'LRT') {
                let bigIcon = route.transitType === 'MTR' ? '<img src="MTR.png" alt="MTR" class="w-10 h-10 object-contain mb-1" style="transform: scale(1.8);">' : '<i class="fas fa-train-tram text-orange-500 text-3xl mb-1"></i>'; 
                const typeName = getTranslation(route.transitType === 'MTR' ? 'transitMTR' : 'transitLRT', route.transitType);
                badgeHtml = `<div class="flex flex-col items-center justify-center w-full mt-1">${bigIcon}<span class="text-[10px] text-gray-500 font-bold whitespace-nowrap mt-1">${typeName}</span></div>`;
            } else { badgeHtml = `<span class="text-[9px] text-gray-400 font-bold mb-1 flex items-center justify-center whitespace-nowrap">${transitDisplay}</span><span class="text-base font-black text-gray-800 truncate max-w-full">${shortRouteName}</span>`; }

            wrapper.innerHTML = `
                <div class="swipe-actions cursor-pointer hover:bg-red-700 transition" onclick="deleteRoute('${route.id}')"><i class="fas fa-trash-alt text-xl"></i></div>
                <div class="swipe-content border-l-4 bg-white flex items-stretch p-0 rounded-r-lg" style="border-color: ${route.color}">
                    <div class="w-16 flex flex-col items-center justify-center border-r border-gray-50 pr-2 mr-3 my-4 ml-3 text-center shrink-0 min-h-[44px]">
                        ${badgeHtml}
                    </div>
                    <div class="flex-1 min-w-0 py-4">
                        <h3 class="text-sm font-bold text-gray-800 truncate" title="${mainTitle}">${mainTitle}</h3>
                        ${subTitleHtml}
                        <div class="flex items-center mt-1.5 space-x-2 text-sm" id="eta-display-${route.id}">
                            <i class="fas fa-spinner fa-spin text-gray-300"></i><span class="text-gray-500">${loadingText}</span>
                        </div>
                    </div>
                    <div class="flex flex-col justify-evenly items-center border-l border-gray-50 bg-gray-50/50 w-12 shrink-0">
                        <button onclick="openEditModal('${route.id}')" class="text-gray-400 hover:text-blue-500 transition w-full h-1/2 flex items-center justify-center border-b border-gray-100">
                            <i class="fas fa-pen text-sm"></i>
                        </button>
                        <div class="drag-handle text-gray-300 hover:text-gray-500 transition w-full h-1/2 flex items-center justify-center cursor-grab active:cursor-grabbing">
                            <i class="fas fa-bars text-lg"></i>
                        </div>
                    </div>
                </div>
            `;
            return wrapper;
        }

        function deleteRoute(id) { let routes = getRoutes(); routes = routes.filter(r => String(r.id) !== String(id)); saveRoutes(routes); initDashboard(); }
        function updateSorting() { const newOrderIds = Array.from(document.querySelectorAll('.swipe-container')).map(el => el.dataset.id); const currentRoutes = getRoutes(); currentRoutes.sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id)); saveRoutes(currentRoutes); }
        function updateGroupSorting() { const groupElements = Array.from(document.querySelectorAll('.group-block')); const groupOrder = groupElements.map(el => el.dataset.groupName); localStorage.setItem('hk_transit_group_order', JSON.stringify(groupOrder)); }

        function initSwipeToDelete() {
            const containers = document.querySelectorAll('.swipe-container'); const threshold = Math.max(-window.innerWidth * 0.2, -80); 
            containers.forEach(container => {
                const content = container.querySelector('.swipe-content'); let startX = 0, currentX = 0, isDragging = false;
                content.addEventListener('pointerdown', (e) => { if (e.target.closest('.drag-handle') || e.target.closest('.swipe-actions') || e.target.closest('button')) return; isDragging = true; startX = e.clientX; content.style.transition = 'none'; content.setPointerCapture(e.pointerId); });
                content.addEventListener('pointermove', (e) => { if (!isDragging) return; const deltaX = e.clientX - startX; if (deltaX < 0 && deltaX > -150) { currentX = deltaX; content.style.transform = `translateX(${currentX}px)`; } });
                const endDrag = (e) => {
                    if (!isDragging) return; isDragging = false; content.style.transition = 'transform 0.2s ease-out'; content.releasePointerCapture(e.pointerId);
                    if (currentX < threshold) { content.style.transform = `translateX(-100%)`; setTimeout(() => deleteRoute(container.dataset.id), 200); }
                    else { content.style.transform = 'translateX(0)'; } currentX = 0;
                };
                content.addEventListener('pointerup', endDrag); content.addEventListener('pointercancel', endDrag);
            });
        }

        async function fetchAllETAs() {
            const routes = getRoutes(); const now = Date.now();
            routes.forEach(async (route) => {
                if (!route.apiUrl || route.apiUrl === '#') return;
                const display = document.getElementById(`eta-display-${route.id}`);
                let etas = []; let directSuccess = false;
                try {
                    const response = await fetch(route.apiUrl, { method: 'GET', headers: { "Accept": "application/json" } });
                    if (response.ok) { const text = await response.text(); if (text && text.trim().length > 0) { const json = JSON.parse(text); etas = parseRawTrafficJson(route, json, now); directSuccess = true; } }
                } catch (directError) {}
                if (!directSuccess) {
                    try {
                        const n8nEtaUrl = `${window.APP_CONFIG.N8N_BASE_URL}/get-eta?url=${encodeURIComponent(route.apiUrl)}`;
                        const response = await fetch(n8nEtaUrl, { method: 'GET', headers: { 'x-transit-token': window.APP_CONFIG.N8N_TOKEN } });
                        if (response.ok) { const json = await response.json(); etas = parseRawTrafficJson(route, json, now); }
                    } catch (bffError) {}
                }
                if (display) {
                    etas = etas.slice(0, 3).sort((a, b) => a - b);
                    if (etas.length > 0) {
                        const etaHtml = etas.map(min => {
                            let colorClass = min <= 5 ? "text-green-600" : (min <= 15 ? "text-orange-500" : "text-gray-800");
                            let timeText = min === 0 ? getTranslation('arriving', '即將抵達') : min; let unit = min === 0 ? "" : `<span class="text-gray-500 text-xs ml-1">${getTranslation('minutes', '分鐘')}</span>`;
                            return `<span class="${colorClass} font-black text-xl">${timeText}</span>${unit}`;
                        }).join('<span class="text-gray-300 mx-2">|</span>');
                        display.innerHTML = etaHtml;
                    } else { display.innerHTML = `<span class="text-gray-400 text-sm">${getTranslation('no_schedule', '暫無班次')}</span>`; }
                }
            });
        }

        function parseRawTrafficJson(routeObj, json, now) {
            let etas = []; let transitType = routeObj.transitType; let apiUrl = routeObj.apiUrl;
            try {
                if (transitType === 'KMB' || transitType === 'CITYBUS' || transitType === 'CTB') {
                    if (json.data && Array.isArray(json.data)) etas = json.data.filter(item => item.eta).map(item => Math.max(0, Math.floor((new Date(item.eta).getTime() - now) / 60000)));
                } else if (transitType === 'MTR') {
                    const urlObj = new URL(apiUrl); const line = urlObj.searchParams.get('line'), dir = urlObj.searchParams.get('dir'), sta = urlObj.searchParams.get('sta'); const mtrKey = `${line}-${sta}`;
                    if (json.data && json.data[mtrKey] && json.data[mtrKey][dir]) etas = json.data[mtrKey][dir].filter(t => t.time).map(t => Math.max(0, Math.floor((new Date(t.time.replace(/-/g, '/')).getTime() - now) / 60000)));
                } else if (transitType === 'FERRY') {
                    let etasRaw = [];
                    if (json.data && json.data.route_list && Array.isArray(json.data.route_list)) json.data.route_list.forEach(route => { if (route.stop_list && Array.isArray(route.stop_list)) route.stop_list.forEach(stop => { if (stop.departure_time) etasRaw.push(stop.departure_time); else if (stop.eta) etasRaw.push(stop.eta); }); });
                    let flatList = json.data || json; if (Array.isArray(flatList)) flatList.forEach(item => { let timeStr = item.ETA || item.eta || item.time || item.departure_time; if (timeStr) etasRaw.push(timeStr); });
                    etas = etasRaw.map(timeStr => {
                        let targetTime;
                        if (/^\d{2}:\d{2}(:\d{2})?$/.test(timeStr)) {
                            const today = new Date(now); const timeParts = timeStr.split(':'); today.setHours(parseInt(timeParts[0], 10), parseInt(timeParts[1], 10), timeParts[2] ? parseInt(timeParts[2], 10) : 0, 0);
                            if (today.getTime() < now) today.setDate(today.getDate() + 1); targetTime = today.getTime();
                        } else { let safeTimeStr = timeStr; if (!timeStr.includes('T')) safeTimeStr = timeStr.replace(/-/g, '/'); targetTime = new Date(safeTimeStr).getTime(); }
                        return Math.floor((targetTime - now) / 60000);
                    }).filter(e => !isNaN(e) && e >= 0);
                } else if (transitType === 'NLB') {
                    if (json.estimatedArrivals && Array.isArray(json.estimatedArrivals)) etas = json.estimatedArrivals.filter(t => t.estimatedArrivalTime).map(t => Math.max(0, Math.floor((new Date(t.estimatedArrivalTime.replace(/-/g, '/')).getTime() - now) / 60000)));
                } else if (transitType === 'GMB') {
                    if (json.data && json.data.length > 0 && json.data[0].eta && Array.isArray(json.data[0].eta)) etas = json.data[0].eta.filter(e => e.diff !== undefined).map(e => e.diff);
                } else if (transitType === 'LRT') {
                    let targetRouteNo = routeObj.route || '';
                    if (!targetRouteNo && routeObj.route_key && routeObj.route_key.startsWith('route_lrt_')) targetRouteNo = routeObj.route_key.replace('route_lrt_', '').toUpperCase();
                    if (targetRouteNo.startsWith('LRT-')) targetRouteNo = targetRouteNo.replace('LRT-', '');
                    let rawEtas = [];
                    if (json.platform_list && Array.isArray(json.platform_list)) { json.platform_list.forEach(plat => { if (plat.route_list && Array.isArray(plat.route_list)) { plat.route_list.forEach(r => { if (r.route_no === targetRouteNo && r.time_en) { const timeStr = r.time_en.toLowerCase(); if (timeStr.includes('arriving') || timeStr.includes('departing') || timeStr === '-') rawEtas.push(0); else { const min = parseInt(timeStr); if (!isNaN(min) && min >= 0) rawEtas.push(min); } } }); } }); }
                    etas = [...new Set(rawEtas)].sort((a, b) => a - b);
                }
            } catch (err) {}
            return etas;
        }
        setInterval(fetchAllETAs, 30000);
    </script>
